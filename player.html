<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XPola Premium Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
    /* الألوان الأساسية: أسود ملكي مع لمسات ذهبية وأبيض */
    :root {
        --accent-color: #00e676; /* يمكنك تغييرها لـ #ffd700 للذهبي */
        --glass-bg: rgba(255, 255, 255, 0.1);
        --ui-gradient: linear-gradient(transparent, rgba(0,0,0,0.9));
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
    #video-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; }

    /* الأزرار المركزية: تصميم زجاجي أنيق */
    .center-controls { position: absolute; display: flex; align-items: center; gap: 35px; z-index: 20; transition: 0.5s ease; }
    .center-btn { 
        width: 65px; height: 65px; border-radius: 50%; 
        background: var(--glass-bg); backdrop-filter: blur(5px);
        border: 1px solid rgba(255,255,255,0.2); color: white; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; transition: 0.3s; position: relative; 
    }
    .play-btn { width: 85px; height: 85px; font-size: 32px; border: 2px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
    .center-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); border-color: var(--accent-color); }
    .skip-val { position: absolute; font-size: 10px; font-weight: bold; top: 55%; }

    /* شريط التحكم السفلي */
    .bottom-ui { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 40px; background: var(--ui-gradient); z-index: 20; transition: 0.5s; }
    
    /* شريط التقدم: نحيف وأنيق */
    .progress-area { width: 100%; height: 3px; background: rgba(255,255,255,0.15); margin-bottom: 25px; cursor: pointer; position: relative; border-radius: 5px; }
    .progress-bar { height: 100%; background: white; width: 0%; border-radius: 5px; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
    
    .tools-flex { display: flex; justify-content: space-between; align-items: center; }
    .live-status { display: flex; align-items: center; gap: 8px; color: white; font-weight: bold; font-size: 13px; text-transform: uppercase; }
    .live-dot { width: 8px; height: 8px; background: #ff0000; border-radius: 50%; animation: pulse 1.5s infinite; }

    /* مجموعة الأيقونات: شكل "مربعات زجاجية" */
    .icons-group { display: flex; gap: 12px; }
    .tool-icon { 
        background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.05); 
        border-radius: 12px; width: 44px; height: 44px; 
        display: flex; align-items: center; justify-content: center; 
        color: white; font-size: 17px; cursor: pointer; transition: 0.3s; 
    }
    .tool-icon:hover { background: var(--accent-color); color: black; transform: translateY(-3px); }

    /* تأثير النبض لمؤشر الـ LIVE */
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    /* إخفاء الواجهة وتحميل الفيديو */
    .hide { opacity: 0; transform: translateY(10px); pointer-events: none; }
    .loader { position: absolute; width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; z-index: 30; display: none; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    @media screen and (orientation: portrait) {
        #video-container { transform: rotate(90deg); width: 100vh; height: 100vw; transform-origin: center; position: fixed; top: 50%; left: 50%; margin-top: -50vw; margin-left: -50vh; }
    }
</style>
</head>
<body>

<div id="video-container">
    <div class="loader" id="loader"></div>

    <div class="center-controls ui-element">
        <div class="center-btn" onclick="skip(-15)"><i class="fas fa-undo-alt"></i><span class="skip-val">15</span></div>
        <div class="center-btn play-btn" id="play-main"><i class="fas fa-pause"></i></div>
        <div class="center-btn" onclick="skip(5)"><i class="fas fa-redo-alt"></i><span class="skip-val">5</span></div>
    </div>

    <div class="bottom-ui ui-element">
        <div class="progress-area" id="prog-area">
            <div class="progress-bar" id="prog-bar"></div>
        </div>
        <div class="tools-flex">
            <div class="live-status"><div class="live-dot"></div> LIVE</div>
            <div class="icons-group">
                <div class="tool-icon"><i class="fas fa-compress"></i></div>
                <div class="tool-icon"><i class="fas fa-volume-up"></i></div>
                <div class="tool-icon"><i class="fas fa-subtitles"></i></div>
                <div class="tool-icon"><i class="fas fa-sliders-h"></i></div>
                <div class="tool-icon"><i class="fas fa-satellite-dish"></i></div>
                <div class="tool-icon" onclick="toggleFull()"><i class="fas fa-expand"></i></div>
            </div>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const loader = document.getElementById('loader');
    const playBtn = document.getElementById('play-main');
    const progBar = document.getElementById('prog-bar');
    const uiElements = document.querySelectorAll('.ui-element');
    let hls, timer;

    function init() {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('servers');
        if(data) {
            try {
                const servers = JSON.parse(decodeURIComponent(escape(atob(data))));
                loadVideo(servers[0].u); // تشغيل الرابط الأول مباشرة
            } catch(e) { console.error("Data error"); }
        }
    }

    function loadVideo(url) {
        loader.style.display = "block";
        if (Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = url; video.play(); }
    }

    playBtn.onclick = () => {
        if(video.paused) { video.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
        else { video.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
    }

    function skip(sec) { video.currentTime += sec; }
    function toggleFull() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    video.ontimeupdate = () => {
        const p = (video.currentTime / video.duration) * 100;
        progBar.style.width = p + '%';
    }

    video.onplaying = () => { loader.style.display = "none"; resetTimer(); }
    video.onwaiting = () => { loader.style.display = "block"; }

    function resetTimer() {
        uiElements.forEach(el => el.classList.remove('hide'));
        clearTimeout(timer);
        timer = setTimeout(() => uiElements.forEach(el => el.classList.add('hide')), 4000);
    }

    document.getElementById('video-container').onclick = resetTimer;
    window.onload = init;
</script>
</body>
</html>
